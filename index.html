// NOTIFICATION SYSTEM
let notifPermission = "default";
const notifiedSet = new Set();
async function requestNotifPermission() {
  if (!("Notification" in window)) return "unsupported";
  if (Notification.permission === "granted") {
    notifPermission = "granted";
    return "granted";
  }
  if (Notification.permission === "denied") {
    notifPermission = "denied";
    return "denied";
  }
  const r = await Notification.requestPermission();
  notifPermission = r;
  return r;
}

// ── NEW: Context-aware notifications ────────────────────────────────────

// Stop hit notification
function sendStopHitNotification(ticker, name, currentPrice, stopPrice, lossPct) {
  if (notifPermission !== "granted") return;
  const key = `stop-${ticker}-${Math.floor(Date.now() / 3600000)}`;
  if (notifiedSet.has(key)) return;
  notifiedSet.add(key);
  try {
    const n = new Notification(`🚨 ${ticker} — STOP LOSS atingido`, {
      body: `$${Number(currentPrice).toFixed(2)} (perda ${lossPct.toFixed(1)}%)\nA IA recomenda vender — verifica a app para ver quanto`,
      tag: key,
      requireInteraction: true
    });
    n.onclick = () => {
      window.focus();
      n.close();
    };
  } catch (e) {}
}

// Target hit notification
function sendTargetHitNotification(ticker, name, currentPrice, targetPrice, gainPct) {
  if (notifPermission !== "granted") return;
  const key = `target-${ticker}-${Math.floor(Date.now() / 3600000)}`;
  if (notifiedSet.has(key)) return;
  notifiedSet.add(key);
  try {
    const n = new Notification(`🎯 ${ticker} — TARGET atingido!`, {
      body: `$${Number(currentPrice).toFixed(2)} (lucro +${gainPct.toFixed(1)}%)\nA IA pode sugerir venda parcial — abre a app`,
      tag: key,
      requireInteraction: true
    });
    n.onclick = () => {
      window.focus();
      n.close();
    };
  } catch (e) {}
}

// AI + algorithm agreement (rare event = high signal)
function sendAIAgreementNotification(ticker, name, score, aiConfidence, price) {
  if (notifPermission !== "granted") return;
  const key = `agree-${ticker}-${Math.floor(Date.now() / 14400000)}`; // 4 hours

// Position approaching stop or target (within 2%)
function sendPositionAlertNotification(ticker, gainPct, stopPct, targetPct, price) {
  if (notifPermission !== "granted") return;
  const isNearStop = stopPct != null && gainPct <= stopPct + 2 && gainPct > stopPct;
  const isNearTarget = targetPct != null && gainPct >= targetPct - 2 && gainPct < targetPct;
  if (!isNearStop && !isNearTarget) return;
  const key = `alert-${ticker}-${isNearStop ? "stop" : "target"}-${Math.floor(Date.now() / 3600000)}`;
  if (notifiedSet.has(key)) return;
  notifiedSet.add(key);
  try {
    const title = isNearStop ? `⚠️ ${ticker} perto do STOP` : `🎯 ${ticker} perto do TARGET`;
    const body = isNearStop ? `$${Number(price).toFixed(2)} (${gainPct.toFixed(1)}% — stop em ${stopPct}%)\nPrepara-te para sair ou ajustar` : `$${Number(price).toFixed(2)} (+${gainPct.toFixed(1)}% — target em +${targetPct}%)\nA IA pode sugerir venda parcial em breve`;
    const n = new Notification(title, {
      body,
      tag: key,
      requireInteraction: false
    });
    n.onclick = () => {
      window.focus();
      n.close();
    };
  } catch (e) {}
}
function sendBuyNotification(ticker, name, signal, score, price, changePct) {
  if (notifPermission !== "granted") return;
  const key = `${ticker}-${Math.floor(Date.now() / 3600000)}`; // 1 per hour per ticker
  if (notifiedSet.has(key)) return;
  notifiedSet.add(key);
  const isStrong = signal === "FORTE_COMPRA";
  const change = changePct < 0 ? `▼ ${Math.abs(changePct).toFixed(1)}%` : `▲ +${changePct.toFixed(1)}%`;
  try {
    const n = new Notification(`${isStrong ? "🚨" : "🔔"} ${ticker} — ${isStrong ? "FORTE COMPRA" : "COMPRA"}`, {
      body: `$${Number(price).toFixed(2)}  (${change})  •  Score ${score}/100\n${name} — oportunidade de compra detetada`,
      tag: key,
      requireInteraction: isStrong
    });
    n.onclick = () => {
      window.focus();
      n.close();
    };
  } catch (e) {}
}

    await fetch(`https://api.emailjs.com/api/v1.0/email/send`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        service_id: KEYS.emailjs_service,
        template_id: KEYS.emailjs_template,
        user_id: KEYS.emailjs_key,
        template_params: {
          to_email: KEYS.emailjs_to,
          subject: `📡 ${signal === "FORTE_COMPRA" ? "🚨 FORTE COMPRA" : "🔔 COMPRA"}: ${ticker} — Score ${score}/100`,
          ticker,
          name,
          signal: signal === "FORTE_COMPRA" ? "FORTE COMPRA" : "COMPRA",
          score,
          price: `$${Number(price).toFixed(2)}`,
          change: `${Number(changePct) >= 0 ? "+" : ""}${Number(changePct).toFixed(2)}%`,
          reasons: (reasons || []).join("\n• "),
          date: new Date().toLocaleString("pt-PT"),
          message: `Oportunidade de compra detetada:\n\nAção: ${ticker} (${name})\nSinal: ${signal}\nScore: ${score}/100\nPreço: $${Number(price).toFixed(2)} (${Number(changePct) >= 0 ? "+" : ""}${Number(changePct).toFixed(2)}%)\n\nMotivos:\n• ${(reasons || []).join("\n• ")}\n\nData: ${new Date().toLocaleString("pt-PT")}`
        }

    });
  } catch (e) {}
}

// BACKTEST: how well does score>=70 work on historical closes?
function backtestTicker(closes) {
  if (!closes || closes.length < 30) return null;
  const results = [];
  for (let i = 20; i < closes.length - 20; i++) {
    const sl = closes.slice(0, i + 1);
    const rsi = computeRSI(sl),
      sma20 = computeSMA(sl, 20),
      sma50 = computeSMA(sl, 50);
    const fd = {
      price: closes[i],
      changePct: (closes[i] - closes[i - 1]) / closes[i - 1] * 100,
      rsi,
      sma20,
      sma50,
      closes: sl,
      sourcesCount: 1
    };
    const sig = calcSignal(fd);
    if (sig.score >= 70) {
      const r5 = closes[i + 5] ? (closes[i + 5] - closes[i]) / closes[i] * 100 : null;
      const r10 = closes[i + 10] ? (closes[i + 10] - closes[i]) / closes[i] * 100 : null;
      const r20 = closes[i + 20] ? (closes[i + 20] - closes[i]) / closes[i] * 100 : null;
      results.push({
        buyPrice: closes[i],
        r5,
        r10,
        r20,
        score: sig.score
      });
    }
  }
  if (!results.length) return null;
  const valid = arr => arr.filter(x => x != null);
  const avg = arr => valid(arr).length ? valid(arr).reduce((a, b) => a + b, 0) / valid(arr).length : null;
  return {
    signals: results.length,
    avgReturn5d: avg(results.map(r => r.r5)),
    avgReturn10d: avg(results.map(r => r.r10)),
    avgReturn20d: avg(results.map(r => r.r20)),
    winRate10d: results.filter(r => (r.r10 || 0) > 0).length / results.length * 100,
    best: Math.max(...results.map(r => r.r10 || 0)),
    worst: Math.min(...results.map(r => r.r10 || 0))
  };
}
function calcSellSignal(entry, price, rsi, sma20, sma50, macd) {
  if (!entry || !price) return null;
  const gainPct = (price - entry.buyPrice) / entry.buyPrice * 100;
  const reasons = [];
  let sell = false;
  if (gainPct >= 30) {
    sell = true;
    reasons.push("Ganho de " + gainPct.toFixed(1) + "% — atingiu alvo de +30%, hora de realizar lucro");
  } else if (gainPct >= 20) {
    sell = true;
    reasons.push("Ganho de " + gainPct.toFixed(1) + "% — zona de lucro sólido, considera vender");
  } else if (gainPct >= 15) {
    reasons.push("Ganho de " + gainPct.toFixed(1) + "% — boa valorização, vigia de perto");
  }
  if (gainPct <= -10) {
    sell = true;
    reasons.push("Perda de " + Math.abs(gainPct).toFixed(1) + "% — stop loss atingido, limita perdas");
  }
  if (rsi && rsi >= 72) {
    sell = true;
    reasons.push("RSI " + rsi.toFixed(1) + " — sobrecomprado, risco elevado de reversão");
  }
  if (sma20 && price > sma20 * 1.12) {
    sell = true;
    reasons.push("Preço 12%+ acima da SMA20 — sobrevalorizado a curto prazo");
  }
  if (macd && macd.hist < 0 && gainPct > 5) {
    sell = true;
    reasons.push("MACD virou negativo — momentum a enfraquecer");
  }
  if (reasons.length === 0 && gainPct > 0) reasons.push("Em lucro de " + gainPct.toFixed(1) + "% — mantém posição, tendência favorável");
  if (reasons.length === 0) reasons.push("Em perda de " + Math.abs(gainPct).toFixed(1) + "% — aguarda recuperação");
  return {
    sell,
    gainPct,
    reasons
  };
}

const fmt = (n, d = 2) => n == null || isNaN(n) ? "—" : Number(n).toFixed(d);
const fmtB = n => !n ? "—" : n >= 1e12 ? `$${(n / 1e12).toFixed(2)}T` : n >= 1e9 ? `$${(n / 1e9).toFixed(1)}B` : n >= 1e6 ? `$${(n / 1e6).toFixed(1)}M` : `$${n}`;
const rsiClr = v => !v ? "#64748b" : v <= 30 ? "#00e5a0" : v <= 45 ? "#4ade80" : v >= 70 ? "#f87171" : v >= 60 ? "#fbbf24" : "#94a3b8";
const rsiLbl = v => !v ? "—" : v <= 30 ? "Sobrevendido 🔥" : v <= 45 ? "Zona de compra" : v >= 70 ? "Sobrecomprado ⚠" : "Neutro";
function computeRSI(closes, p = 14) {
  if (!closes || closes.length < p + 1) return null;
  let g = 0,
    l = 0;
  for (let i = closes.length - p; i < closes.length; i++) {
    const d = closes[i] - closes[i - 1];
    d > 0 ? g += d : l -= d;
  }
  const ag = g / p,
    al = l / p;
  return al === 0 ? 100 : 100 - 100 / (1 + ag / al);
}
function computeSMA(c, n) {
  return !c || c.length < n ? null : c.slice(-n).reduce((a, b) => a + b, 0) / n;
}

// ─── NEW: Annualized Volatility ──────────────────────────────────────────────
// Calculates standard deviation of daily log returns and annualizes it (×√252)
// Returns volatility as a percentage (e.g., 0.45 = 45% annualized)
function computeVolatility(closes, period = 30) {
  if (!closes || closes.length < period + 1) return null;
  const slice = closes.slice(-(period + 1));
  // Daily log returns
  const returns = [];
  for (let i = 1; i < slice.length; i++) {
    if (slice[i - 1] > 0 && slice[i] > 0) returns.push(Math.log(slice[i] / slice[i - 1]));
  }
  if (returns.length < 5) return null;
  const mean = returns.reduce((s, v) => s + v, 0) / returns.length;
  const variance = returns.reduce((s, v) => s + (v - mean) ** 2, 0) / returns.length;
  const dailyStdDev = Math.sqrt(variance);
  // Annualize (252 trading days per year)
  return dailyStdDev * Math.sqrt(252);
}

// ─── NEW: Z-Score of current price vs N-day mean ────────────────────────────
// Returns how many standard deviations the current price is from the rolling mean
// Z = (price - mean) / stdDev
// Z <= -2 = statistically rare (cheap), Z >= +2 = statistically rare (expensive)
function computeZScore(closes, period = 20) {
  if (!closes || closes.length < period) return null;
  const slice = closes.slice(-period);
  const mean = slice.reduce((s, v) => s + v, 0) / period;
  const variance = slice.reduce((s, v) => s + (v - mean) ** 2, 0) / period;
  const stdDev = Math.sqrt(variance);
  if (stdDev === 0) return 0;
  const currentPrice = closes[closes.length - 1];
  return (currentPrice - mean) / stdDev;
}

// SOURCE 6 — STOOQ (daily CSV, no key needed)
// ─────────────────────────────────────────────────────────────────────────────
async function fromStooq(ticker) {
  try {
    // Fetch full history — Stooq returns all available data (typically 5-15 years)
    const r = await fetch(`https://stooq.com/q/d/l/?s=${ticker.toLowerCase()}.us&i=d`);
    const txt = await r.text();
    const lines = txt.trim().split("\n").filter(l => l && !l.startsWith("Date"));
    if (lines.length < 2) return null;
    // Parse ALL rows: date, open, high, low, close, volume
    const rows = lines.map(l => {
      const p = l.split(",");
      return {
        date: p[0],
        o: +p[1],
        h: +p[2],
        lo: +p[3],
        c: +p[4],
        v: +p[5]
      };
    }).filter(r => r.c > 0);
    if (rows.length < 2) return null;
    const closes = rows.map(r => r.c);
    const dates = rows.map(r => r.date);
    const volumes = rows.map(r => r.v);
    const highs = rows.map(r => r.h);
    const lows = rows.map(r => r.lo);
    const price = closes[closes.length - 1],
      prev = closes[closes.length - 2];

    // Compute MACD (12,26,9)
    function ema(arr, n) {
      const k = 2 / (n + 1);
      let e = arr[0];
      return arr.map((v, i) => {
        if (i === 0) {
          e = v;
        } else {
          e = v * k + e * (1 - k);
        }
        return e;
      });
    }
    const ema12 = ema(closes, 12),
      ema26 = ema(closes, 26);
    const macdLine = ema12.map((v, i) => v - ema26[i]);
    const signalLine = ema(macdLine, 9);
    const macdHist = macdLine[macdLine.length - 1] - signalLine[signalLine.length - 1];
    const macdVal = {
      macd: macdLine[macdLine.length - 1],
      signal: signalLine[signalLine.length - 1],
      hist: macdHist
    };

    // Compute Bollinger Bands (20,2)
    const sma20arr = closes.map((_, i, a) => i < 19 ? null : a.slice(i - 19, i + 1).reduce((s, v) => s + v, 0) / 20);
    const std20 = closes.map((_, i, a) => {
      if (i < 19) return null;
      const sl = a.slice(i - 19, i + 1),
        m = sl.reduce((s, v) => s + v, 0) / 20;
      return Math.sqrt(sl.reduce((s, v) => s + (v - m) ** 2, 0) / 20);
    });
    const bb = {
      upper: (sma20arr[sma20arr.length - 1] || 0) + 2 * (std20[std20.length - 1] || 0),
      lower: (sma20arr[sma20arr.length - 1] || 0) - 2 * (std20[std20.length - 1] || 0)
    };

    // ── PRICE SANITY CHECK ────────────────────────────────────────────────
    // Stooq sometimes returns stale/wrong data for certain tickers
    // Reject if price looks unrealistic:
    // 1. Price hasn't changed in last 5 rows (stale data)
    // 2. Last date is more than 5 trading days old
    // 3. Price is suspiciously low vs recent history
    const recentCloses = closes.slice(-10);
    const allSame = recentCloses.every(c => c === recentCloses[0]);
    if (allSame) return null; // all same price = stale data

    // Check last date is recent (within 7 calendar days)
    const lastDate = new Date(dates[dates.length - 1]);
    const daysSinceLastData = (Date.now() - lastDate.getTime()) / 86400000;
    if (daysSinceLastData > 7) return null; // data too old

    // Check price is not suspiciously different from median of last 20 closes
    const sorted = [...recentCloses].sort((a, b) => a - b);
    const median = sorted[Math.floor(sorted.length / 2)];
    if (price < median * 0.3 || price > median * 3) return null; // price anomaly

    return {
      price,
      prevClose: prev,
      changeAbs: price - prev,
      changePct: (price - prev) / prev * 100,
      dayLow: lows[lows.length - 1],
      dayHigh: highs[highs.length - 1],
      volume: volumes[volumes.length - 1],
      mktCap: null,
      pe: null,
      eps: null,
      closes,
      dates,
      volumes,
      highs,
      lows,
      rsi: computeRSI(closes),
      sma20: computeSMA(closes, 20),
      sma50: computeSMA(closes, 50),
      sma200: computeSMA(closes, 200),
      macd: macdVal,
      bb,
      historyYears: Math.round(closes.length / 252),
      sources: ["stooq"]
    };
  } catch {
    return null;
  }
}

// 2. Volume analysis (computed from Stooq volumes)
function analyzeVolume(volumes, closes) {
  if (!volumes || volumes.length < 20) return null;
  const avgVol20 = volumes.slice(-20).reduce((a, b) => a + b, 0) / 20;
  const todayVol = volumes[volumes.length - 1];
  const volRatio = todayVol / avgVol20;
  const recentClose = closes[closes.length - 1];
  const prevClose = closes[closes.length - 2];
  const priceDown = recentClose < prevClose;
  return {
    volRatio,
    highVolume: volRatio > 1.5,
    lowVolume: volRatio < 0.5,
    // High volume on down day = institutional selling (bad)
    // High volume on up day = institutional buying (good)
    // Low volume on down day = normal pullback (opportunity)
    signal: priceDown ? volRatio > 2 ? "VENDA_FORTE" : volRatio > 1.5 ? "VENDA_INSTITUCIONAL" : volRatio < 0.7 ? "PULLBACK_NORMAL" : "NEUTRO" : volRatio > 1.5 ? "COMPRA_FORTE" : "NEUTRO"
  };
}

// 6. Beta calculation (correlation with market)
function computeBeta(tickerCloses, spyCloses) {
  if (!tickerCloses || !spyCloses || tickerCloses.length < 20) return null;
  const n = Math.min(tickerCloses.length, spyCloses.length, 60);
  const tc = tickerCloses.slice(-n),
    sc = spyCloses.slice(-n);
  const tcR = tc.slice(1).map((v, i) => (v - tc[i]) / tc[i]);
  const scR = sc.slice(1).map((v, i) => (v - sc[i]) / sc[i]);
  const meanTc = tcR.reduce((a, b) => a + b, 0) / tcR.length;
  const meanSc = scR.reduce((a, b) => a + b, 0) / scR.length;
  const cov = tcR.reduce((s, v, i) => s + (v - meanTc) * (scR[i] - meanSc), 0) / tcR.length;
  const varSc = scR.reduce((s, v) => s + (v - meanSc) ** 2, 0) / scR.length;
  return varSc > 0 ? Math.round(cov / varSc * 100) / 100 : null;
}

// ── MARKET HOURS (NYSE/NASDAQ: 14:30-21:00 Lisbon time) ─────────────────────
function getMarketStatus() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const et = new Date(utc + -4 * 3600000); // ET (UTC-4 summer, UTC-5 winter)
  const h = et.getHours(),
    m = et.getMinutes(),
    day = et.getDay();
  const mins = h * 60 + m;
  const isWeekday = day >= 1 && day <= 5;
  const isOpen = isWeekday && mins >= 570 && mins < 960; // 9:30-16:00 ET
  const isPreMarket = isWeekday && mins >= 240 && mins < 570; // 4:00-9:30 ET
  const isAfterHours = isWeekday && mins >= 960 && mins < 1200; // 16:00-20:00 ET
  const minsToOpen = isWeekday && mins < 570 ? 570 - mins : null;
  const minsToClose = isOpen ? 960 - mins : null;
  return {
    isOpen,
    isPreMarket,
    isAfterHours,
    isWeekday,
    minsToOpen,
    minsToClose,
    label: isOpen ? "ABERTO" : isPreMarket ? "PRÉ-MERCADO" : isAfterHours ? "AFTER HOURS" : "FECHADO",
    color: isOpen ? "#00e5a0" : isPreMarket || isAfterHours ? "#fbbf24" : "#f87171"
  };
}

function saveSignalPerformance(p) {

function recordSignalEntry(ticker, price, signal, score) {
  const perf = loadSignalPerformance();
  if (!perf[ticker]) perf[ticker] = [];
  perf[ticker].push({
    entryPrice: price,
    signal,
    score,
    entryDate: new Date().toISOString(),
    resolved: false,
    returnPct: null
  });
  saveSignalPerformance(perf);
  return perf;
}
function updateSignalPerformance(stockData) {
  const perf = loadSignalPerformance();
  let updated = false;
  Object.entries(perf).forEach(([ticker, entries]) => {
    const currentPrice = stockData[ticker]?.price;
    if (!currentPrice) return;
    entries.forEach(e => {
      if (!e.resolved) {
        e.returnPct = (currentPrice - e.entryPrice) / e.entryPrice * 100;
        const daysSince = (Date.now() - new Date(e.entryDate).getTime()) / 86400000;
        if (daysSince >= 30) e.resolved = true; // resolve after 30 days
        updated = true;
      }
    });
  });
  if (updated) saveSignalPerformance(perf);
  return perf;
}
function getPerformanceSummary(perf) {
  const all = Object.values(perf).flat();
  const resolved = all.filter(e => e.resolved && e.returnPct !== null);
  const active = all.filter(e => !e.resolved && e.returnPct !== null);
  if (!all.length) return null;
  const wins = resolved.filter(e => e.returnPct > 0).length;
  const avg = resolved.length ? resolved.reduce((s, e) => s + e.returnPct, 0) / resolved.length : null;
  return {
    total: all.length,
    resolved: resolved.length,
    active: active.length,
    winRate: resolved.length ? wins / resolved.length * 100 : null,
    avgReturn: avg,
    best: resolved.length ? Math.max(...resolved.map(e => e.returnPct)) : null,
    worst: resolved.length ? Math.min(...resolved.map(e => e.returnPct)) : null
  };
}

function checkPriceAlerts(ticker, price, alerts, onTriggered) {
  const triggered = [];
  const remaining = alerts.filter(a => {
    if (a.ticker !== ticker) return true;
    const hit = a.condition === "below" ? price <= a.targetPrice : price >= a.targetPrice;
    if (hit) {
      triggered.push(a);
      onTriggered(a, price);
      return false;
    }
    return true;
  });
  if (triggered.length) savePriceAlerts(remaining);
  return remaining;
}

function calcSignal(d) {
  if (!d) return {
    signal: "NEUTRO",
    score: 50,
    reasons: []
  };
  let score = 50;
  const reasons = [];

  // Price momentum
  if (d.changePct <= -5) {
    score += 18;
    reasons.push(`Queda de ${fmt(Math.abs(d.changePct))}% hoje — possível oversell`);
  } else if (d.changePct <= -3) {
    score += 10;
    reasons.push(`Correção de ${fmt(Math.abs(d.changePct))}%`);
  } else if (d.changePct <= -1) score += 4;else if (d.changePct >= 3) score -= 8;

  // RSI
  if (d.rsi) {
    if (d.rsi <= 25) {
      score += 22;
      reasons.push(`RSI ${fmt(d.rsi, 1)} — extremamente sobrevendido`);
    } else if (d.rsi <= 30) {
      score += 15;
      reasons.push(`RSI ${fmt(d.rsi, 1)} — sobrevendido (zona de compra)`);
    } else if (d.rsi <= 40) {
      score += 7;
      reasons.push(`RSI ${fmt(d.rsi, 1)} — abaixo da média histórica`);
    } else if (d.rsi >= 70) score -= 15;else if (d.rsi >= 60) score -= 5;
  }

  // SMA crossovers
  if (d.sma20 && d.price < d.sma20 * 0.95) {
    score += 8;
    reasons.push("Preço 5%+ abaixo da SMA20");
  }
  if (d.sma50 && d.price < d.sma50 * 0.95) {
    score += 6;
    reasons.push("Preço 5%+ abaixo da SMA50 — suporte histórico");
  }
  if (d.sma20 && d.sma50 && d.sma20 > d.sma50) {
    score += 4;
    reasons.push("SMA20 cruzou acima da SMA50 (Golden Cross)");
  }

  // MACD
  if (d.macd) {
    if (d.macd.hist > 0 && d.macd.macd > d.macd.signal) {
      score += 6;
      reasons.push("MACD positivo — momentum bullish");
    } else if (d.macd.hist < 0) score -= 4;
  }

  // P/E valuation
  if (d.pe && d.pe > 0 && d.pe < 15) {
    score += 5;
    reasons.push(`P/E ${fmt(d.pe, 1)} — possível subavaliação`);
  } else if (d.pe && d.pe > 50) score -= 4;

  // Weekly range
  const closes = d.closes || [];
  if (closes.length > 5) {
    const recent = closes.slice(-10);
    const mn = Math.min(...recent),
      mx = Math.max(...recent),
      range = mx - mn;
    const pos = range > 0 ? (d.price - mn) / range : 0.5;
    if (pos <= 0.1) {
      score += 9;
      reasons.push("Preço no mínimo das últimas 2 semanas");
    } else if (pos >= 0.9) score -= 6;
  }

  // SMA200 — long-term trend
  if (d.sma200 && d.price) {
    if (d.price < d.sma200 * 0.90) {
      score += 8;
      reasons.push("Preço 10%+ abaixo da SMA200 — zona de valor histórico");
    } else if (d.price < d.sma200) {
      score += 3;
      reasons.push("Preço abaixo da SMA200 — tendência de longo prazo negativa");
    }
  }

  // Bollinger Bands
  if (d.bb && d.price) {
    if (d.price <= d.bb.lower) {
      score += 10;
      reasons.push("Preço abaixo da banda inferior de Bollinger — sobrevendido");
    } else if (d.price >= d.bb.upper) {
      score -= 8;
    }
  }

  // Data quality bonus
  if (d.sourcesCount >= 3) score += 2;
  if (d.historyYears >= 2) score += 1;

  // ── SIGNAL 1: VIX / Market Environment ───────────────────────────────────
  const macro = d.macro;
  if (macro) {
    if (macro.vix >= 35) {
      score += 12;
      reasons.push(`VIX ${macro.vix?.toFixed(1)} — pânico extremo no mercado, historicamente zona de compra`);
    } else if (macro.vix >= 25) {
      score += 6;
      reasons.push(`VIX ${macro.vix?.toFixed(1)} — medo elevado, boas oportunidades tendem a surgir`);
    } else if (macro.vix >= 20) {
      score += 2;
    } else if (macro.vix < 15) {
      score -= 4;
    } // complacency, market expensive

    if (macro.spyTrend === "BEAR") {
      score -= 8;
      reasons.push("S&P500 abaixo da SMA20 — mercado em tendência de baixa, cuidado");
    } else if (macro.spyTrend === "BULL") {
      score += 4;
    }
    if (macro.spyChange5d !== null) {
      if (macro.spyChange5d <= -3) {
        score += 6;
        reasons.push(`S&P500 caiu ${Math.abs(macro.spyChange5d).toFixed(1)}% esta semana — queda generalizada pode criar oportunidades`);
      } else if (macro.spyChange5d >= 3) {
        score -= 4;
      }
    }
  }

  // ── SIGNAL 2: Volume Analysis ─────────────────────────────────────────────
  const va = d.volumeAnalysis;
  if (va) {
    if (va.signal === "PULLBACK_NORMAL") {
      score += 8;
      reasons.push(`Volume ${(va.volRatio * 100).toFixed(0)}% da média — queda em volume baixo, sinal de pullback normal não de pânico`);
    } else if (va.signal === "VENDA_INSTITUCIONAL") {
      score -= 10;
      reasons.push(`Volume ${(va.volRatio * 100).toFixed(0)}% da média na queda — possível venda institucional, cuidado`);
    } else if (va.signal === "VENDA_FORTE") {
      score -= 15;
      reasons.push(`Volume ${(va.volRatio * 100).toFixed(0)}% da média — venda massiva detetada, aguarda estabilização`);
    } else if (va.signal === "COMPRA_FORTE") {
      score += 10;
      reasons.push(`Volume ${(va.volRatio * 100).toFixed(0)}% da média na subida — compra institucional detetada`);
    }
  }

  // ── SIGNAL 3: Earnings Calendar ───────────────────────────────────────────
  if (d.daysToEarnings !== null) {
    if (d.daysToEarnings <= 3) {
      score -= 15;
      reasons.push(`⚠ Resultados em ${d.daysToEarnings} dia${d.daysToEarnings !== 1 ? "s" : ""} — risco elevado, evita comprar antes dos earnings`);
    } else if (d.daysToEarnings <= 7) {
      score -= 8;
      reasons.push(`Resultados em ${d.daysToEarnings} dias (${d.nextEarningDate}) — zona de risco elevado`);
    } else if (d.daysToEarnings <= 14) {
      score -= 4;
      reasons.push(`Resultados em ${d.daysToEarnings} dias — mantém posição pequena`);
    } else if (d.daysToEarnings > 30) {
      score += 3;
      reasons.push(`Resultados a ${d.daysToEarnings} dias — janela segura para entrada`);
    }
  }

  // ── SIGNAL 4: Insider Buying ──────────────────────────────────────────────
  if (d.insiderBuying) {
    const val = d.insiderBuyValue;
    if (val >= 1000000) {
      score += 12;
      reasons.push(`Insiders compraram $${(val / 1e6).toFixed(1)}M da própria ação — sinal muito forte de confiança interna`);
    } else if (val >= 100000) {
      score += 7;
      reasons.push(`Insiders compraram $${(val / 1000).toFixed(0)}k da própria ação nos últimos 90 dias`);
    } else {
      score += 4;
      reasons.push("Insiders compraram ações da própria empresa recentemente");
    }
  }

  // ── SIGNAL 5: Analyst Consensus ──────────────────────────────────────────
  if (d.analystScore) {
    const {
      buy,
      sell,
      hold
    } = d.analystScore;
    const total = buy + sell + hold || 1;
    const buyPct = buy / total * 100;
    if (buyPct >= 75) {
      score += 8;
      reasons.push(`${buy} analistas recomendam COMPRA de ${total} total (${buyPct.toFixed(0)}%) — consenso bullish`);
    } else if (buyPct >= 60) {
      score += 4;
      reasons.push(`${buy}/${total} analistas recomendam compra`);
    } else if (buyPct < 30) {
      score -= 6;
      reasons.push(`Apenas ${buyPct.toFixed(0)}% dos analistas recomendam compra — consenso bearish`);
    }
  }

  // ── SIGNAL 6: Company Fundamental Quality ───────────────────────────────
  const q = d.quality;
  if (q) {
    if (q.qualityScore >= 75) {
      score += 10;
      reasons.push(`Empresa de qualidade ${q.label} (score ${q.qualityScore}/100) — fundamentos sólidos`);
    } else if (q.qualityScore >= 60) {
      score += 5;
      reasons.push(`Empresa com fundamentos ${q.label} (score ${q.qualityScore}/100)`);
    } else if (q.qualityScore < 30) {
      score -= 15;
      reasons.push(`⚠ Fundamentos ${q.label} — empresa em dificuldade, cuidado extra`);
    } else if (q.qualityScore < 45) {
      score -= 7;
      reasons.push(`Fundamentos ${q.label} — empresa não está em forma ideal`);
    }
    if (q.revGrowth !== null) {
      if (q.revGrowth > 0.20) {
        score += 6;
        reasons.push(`Receita a crescer ${(q.revGrowth * 100).toFixed(0)}% — empresa em expansão`);
      } else if (q.revGrowth < -0.05) {
        score -= 8;
        reasons.push(`Receita a decrescer ${(Math.abs(q.revGrowth) * 100).toFixed(0)}% — sinal de alerta`);
      }
    }
    if (q.netMargin !== null && q.netMargin < 0) {
      score -= 10;
      reasons.push("Empresa a operar com prejuízo — risco elevado");
    }
  }
  score = Math.max(0, Math.min(100, Math.round(score)));
  const signal = score >= 78 ? "FORTE_COMPRA" : score >= 62 ? "COMPRA" : score >= 45 ? "NEUTRO" : score >= 30 ? "AGUARDAR" : "VENDER";

  // Market environment warning
  const marketWarning = macro?.spyTrend === "BEAR" && macro?.vix > 25 ? "⚠ Mercado em tendência negativa — mesmo sinais fortes têm maior risco" : null;

  // Quality warning
  const qualityWarning = q && q.qualityScore < 40 ? `⚠ Empresa com fundamentos ${q.label} — verifica os resultados antes de comprar` : null;
  return {
    signal,
    score,
    reasons,
    marketWarning,
    qualityWarning
  };
}

function buildCombinedVerdict(sigData, aiAnalysis) {
  if (!sigData) return null;
  if (!aiAnalysis) {
    return {
      verdict: sigData.signal,
      label: sigData.signal === "FORTE_COMPRA" ? "FORTE COMPRA" : sigData.signal,
      color: sigData.signal === "FORTE_COMPRA" ? "#00e5a0" : sigData.signal === "COMPRA" ? "#4ade80" : "#94a3b8",
      detail: `Score ${sigData.score}/100 (apenas algoritmo)`,
      icon: "🤖"
    };
  }
  const aiBuy = aiAnalysis.decision === "COMPRA" || aiAnalysis.decision === "COMPRA_PARCIAL";
  const algoBuy = sigData.signal === "COMPRA" || sigData.signal === "FORTE_COMPRA";
  if (algoBuy && aiBuy && aiAnalysis.confidence >= 70) {
    return {
      verdict: "DUPLO_COMPRA",
      label: "✅ ALGORITMO + IA CONCORDAM",
      color: "#00e5a0",
      detail: `Score ${sigData.score} · IA ${aiAnalysis.confidence}% confiança · ${aiAnalysis.positionSize === "FULL" ? "Posição completa" : aiAnalysis.positionSize === "HALF" ? "Meia posição" : "Quarto de posição"}`,
      icon: "🎯"
    };
  }
  if (algoBuy && aiBuy) {
    return {
      verdict: "COMPRA_CAUTELOSA",
      label: "⚡ COMPRA COM CAUTELA",
      color: "#4ade80",
      detail: `Algoritmo e IA concordam mas IA com ${aiAnalysis.confidence}% confiança — entra com posição reduzida`,
      icon: "⚡"
    };
  }
  if (algoBuy && aiAnalysis.decision === "ESPERAR") {
    return {
      verdict: "HESITACAO",
      label: "⏳ IA SUGERE ESPERAR",
      color: "#fbbf24",
      detail: `Algoritmo Score ${sigData.score} mas IA recomenda esperar — verifica os riscos`,
      icon: "⏳"
    };
  }
  if (algoBuy && aiAnalysis.decision === "NAO_COMPRAR") {
    return {
      verdict: "CONFLITO",
      label: "⚠️ IA CONTESTA O ALGORITMO",
      color: "#f87171",
      detail: `Algoritmo diz COMPRA (${sigData.score}) mas IA identifica riscos sérios — não compres`,
      icon: "⚠️"
    };
  }
  return {
    verdict: sigData.signal,
    label: sigData.signal,
    color: "#94a3b8",
    detail: `Score ${sigData.score}/100`,
    icon: "🤖"
  };
}
